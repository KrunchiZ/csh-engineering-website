<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Compressor Controllers — CSH Engineering Services & Trading</title>
  <meta name="description" content="Specialist repair, reconditioning and supply of electronic controller modules for Ingersoll Rand, Kaeser, Sullair, Atlas Copco and more. 25 years experience.">
  <meta name="keywords" content="air compressor controller repair, Ingersoll Rand Intellisys, Kaeser Sigma Control, Sullair controller, Atlas Copco controller, Malaysia">
  <meta property="og:title" content="Air Compressor Controllers — CSH Engineering Services & Trading">
  <meta property="og:description" content="Repair, reconditioning and supply of electronic controller modules for major compressor brands.">
  <meta property="og:type" content="website">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="controllers">

  <div id="navbar"></div>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="container">
      <p class="page-header-eyebrow">Primary Service</p>
      <h1 class="page-header-title">Air Compressor Controllers</h1>
      <p class="page-header-sub">
        Repair, reconditioning and supply of electronic controller modules for rotary, reciprocal and centrifugal air compressors.
        Servicing lead times are estimates and confirmed case by case.
      </p>
      <a href="reconditioned.html" class="btn-csh-outline">
        View Reconditioned Stock <i class="bi bi-arrow-right ms-1"></i>
      </a>
    </div>
  </div>

  <!-- CONTROLLERS LIST -->
  <section class="section">
    <div class="container">
      <div id="controllers-list">
        <div class="text-center py-5 text-muted-c">
          <div class="spinner-border spinner-border-sm me-2" role="status"></div>
          Loading...
        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <script>
    function renderControllers(data) {
      const container = document.getElementById('controllers-list');
      if (!data.length) {
        container.innerHTML = '<p class="text-muted-c">No controllers listed yet.</p>';
        return;
      }

      container.innerHTML = data.map((item, index) => {
        // const isEven = index % 2 === 0;

        const images = item.images?.length ? item.images : ['https://placehold.co/600x400?text=Placeholder'];
        const carouselId = `carousel-${item.id}`;

        const carouselItems = images.map((img, i) => `
          <div class="carousel-item ${i === 0 ? 'active' : ''}">
            <img src="${img}" alt="${item.name}" class="d-block w-100 controller-img"
              onerror="this.src='https://placehold.co/600x400?text=Placeholder'">
          </div>`).join('');

        const carouselControls = images.length > 1 ? `
          <button class="carousel-control-prev" type="button" data-bs-target="#${carouselId}" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#${carouselId}" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>` : '';

        const carouselIndicators = images.length > 1 ? `
          <div class="carousel-indicators">
            ${images.map((_, i) => `
              <button type="button" data-bs-target="#${carouselId}" data-bs-slide-to="${i}"
                ${i === 0 ? 'class="active"' : ''} aria-label="Image ${i+1}"></button>`).join('')}
          </div>` : '';

        const models = item.models?.length
          ? `<div class="controller-parts">
               <span class="controller-parts-label">Model / Part Numbers</span>
               ${item.models.map(p => `<span class="part-badge">${p}</span>`).join('')}
             </div>` : '';

        const brandEl = item.brandUrl
          ? `<a href="${item.brandUrl}" target="_blank" rel="noopener noreferrer" class="controller-brand-link">
               ${item.brand} <i class="bi bi-box-arrow-up-right ms-1"></i>
             </a>`
          : `<span class="controller-brand-link">${item.brand}</span>`;

        const problems = item.commonProblems?.length
          ? `<div class="controller-problems">
               <p class="controller-problems-label">Common Problems</p>
               <ol class="controller-problems-list">
                 ${item.commonProblems.map(p => `<li>${p}</li>`).join('')}
               </ol>
             </div>` : '';

        const imgCol = `
          <div class="col-md-5">
            <div id="${carouselId}" class="carousel slide controller-carousel" data-bs-ride="false">
              ${carouselIndicators}
              <div class="carousel-inner">${carouselItems}</div>
              ${carouselControls}
            </div>
          </div>`;

        const infoCol = `
          <div class="col-md-7">
            <div class="controller-info">
              ${brandEl}
              <h2 class="controller-title">${item.name}</h2>
              <p class="controller-desc">${item.description}</p>
              ${models}
              ${problems}
              ${item.serviceLeadTime ? `
                <div class="controller-leadtime">
                  <i class="bi bi-clock me-2"></i>Service Lead Time: <strong>${item.serviceLeadTime}</strong>
                </div>` : ''}
              <a href="https://wa.me/60122911125?text=Hi, I would like to enquire about ${encodeURIComponent(item.name)}"
                 target="_blank" rel="noopener noreferrer" class="btn-csh mt-3 d-inline-block">
                <i class="bi bi-whatsapp me-1"></i> Enquire Now
              </a>
            </div>
          </div>`;

        return `
          <div class="controller-row row align-items-center g-4 ${index < data.length - 1 ? 'mb-5 pb-5 border-bottom' : ''}">
            ${imgCol + infoCol}
          </div>`;
        // swap with ${isEven ? imgCol + infoCol : infoCol + imgCol} for alternating layout
      }).join('');
    }

    fetch('data/controllers.json')
      .then(r => r.json())
      .then(renderControllers)
      .catch(() => {
        document.getElementById('controllers-list').innerHTML =
          '<p class="text-muted-c">Failed to load controllers. Please try again later.</p>';
      });
  </script>

</body>
</html>
