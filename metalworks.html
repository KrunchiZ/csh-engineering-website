  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="Laser Cut Metal Enclosures — CSH Engineering Services & Trading">

  <link rel="canonical" href="https://cshengineering.com/metalworks"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<body data-page="metalworks">

  <div id="navbar"></div>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="container">
      <p class="page-header-eyebrow">Metal Fabrication</p>
      <h1 class="page-header-title">Laser Cut Metal Works</h1>
      <p class="page-header-sub">
        Supply custom laser cut enclosures and metal products for fire safety, industrial and commercial applications.
        Over 20 years experience in metal fabrication solutions.
      </p>
    </div>
  </div>

  <!-- ENCLOSURES LIST -->
  <section class="section">
    <div class="container">
      <div id="metalworks-list">
        <div class="text-center py-5 text-muted-c">
          <div class="spinner-border spinner-border-sm me-2" role="status"></div>
          Loading...
        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <script>
    function renderMetalWorks(data) {
      const container = document.getElementById('metalworks-list');
      if (!data.length) {
        container.innerHTML = '<p class="text-muted-c">No product listed yet.</p>';
        return;
      }

      container.innerHTML = data.map((item, index) => {
        // const isEven = index % 2 === 0;

        const images = item.images?.length ? item.images : ['https://placehold.co/600x400?text=Placeholder'];
        const carouselId = `carousel-${item.id}`;

        const carouselItems = images.map((img, i) => `
          <div class="carousel-item ${i === 0 ? 'active' : ''}">
            <img src="${img}" alt="${item.name}" class="d-block w-100 controller-img"
              onerror="this.src='https://placehold.co/600x400?text=Placeholder'">
          </div>`).join('');

        const carouselControls = images.length > 1 ? `
          <button class="carousel-control-prev" type="button" data-bs-target="#${carouselId}" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#${carouselId}" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>` : '';

        const carouselIndicators = images.length > 1 ? `
          <div class="carousel-indicators">
            ${images.map((_, i) => `
              <button type="button" data-bs-target="#${carouselId}" data-bs-slide-to="${i}"
                ${i === 0 ? 'class="active"' : ''} aria-label="Image ${i+1}"></button>`).join('')}
          </div>` : '';

        const models = item.models?.length
          ? `<div class="controller-parts">
               <span class="controller-parts-label">Models</span>
               ${item.models.map(m => `<span class="part-badge">${m}</span>`).join('')}
             </div>` : '';

        const imgCol = `
          <div class="col-md-5">
            <div id="${carouselId}" class="carousel slide controller-carousel" data-bs-ride="carousel">
              ${carouselIndicators}
              <div class="carousel-inner">${carouselItems}</div>
              ${carouselControls}
            </div>
          </div>`;

        const infoCol = `
          <div class="col-md-7">
            <div class="controller-info">
              <span class="controller-brand-link">${item.category}</span>
              <h2 class="controller-title">${item.name}</h2>
              <p class="controller-desc">${item.description}</p>
              ${models}
              ${item.brand ? `
                <div class="controller-leadtime">
                  <i class="bi bi-building me-2"></i>Brand: <strong>${item.brand}</strong>
                </div>` : ''}
              <a href="https://wa.me/60122311781?text=Hi, I would like to enquire about ${encodeURIComponent(item.name)}"
                 target="_blank" rel="noopener noreferrer" class="btn-csh mt-3 d-inline-block">
                <i class="bi bi-whatsapp me-1"></i> Enquire Now
              </a>
            </div>
          </div>`;

        return `
          <div class="controller-row row align-items-center g-4 ${index < data.length - 1 ? 'mb-5 pb-5 border-bottom' : ''}">
            ${imgCol + infoCol}
          </div>`;
        // swap with ${isEven ? imgCol + infoCol : infoCol + imgCol} for alternating layout
      }).join('');
    }

    fetch('data/metalworks.json')
      .then(r => r.json())
      .then(renderMetalWorks)
      .catch(() => {
        document.getElementById('metalworks-list').innerHTML =
          '<p class="text-muted-c">Failed to load metal works options. Please try again later.</p>';
      });
  </script>

</body>
</html>
